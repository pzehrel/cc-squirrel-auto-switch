name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          PLUGIN_VERSION=$(jq -r '.version' .claude-plugin/plugin.json)
          MARKET_VERSION=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)

          if [ "$TAG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "Error: tag v${TAG_VERSION} ≠ plugin.json version ${PLUGIN_VERSION}"
            exit 1
          fi

          if [ "$TAG_VERSION" != "$MARKET_VERSION" ]; then
            echo "Error: tag v${TAG_VERSION} ≠ marketplace.json version ${MARKET_VERSION}"
            exit 1
          fi

          echo "Version $TAG_VERSION — all consistent."

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ github.ref_name }}"
          generate_release_notes: true
